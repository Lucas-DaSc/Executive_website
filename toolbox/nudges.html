<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicateur d'Incitations Environnementales (Nudges)</title>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f8fafc;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --radius: 8px;
            --transition: all 0.2s ease-in-out;

            /* Couleurs d'état pour le score */
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 640px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: calc(var(--radius) * 2);
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Section Score */
        .score-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            text-align: center;
            margin-bottom: 2rem;
            transition: var(--transition);
        }

        .score-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-muted);
            line-height: 1;
            margin-bottom: 0.75rem;
            transition: var(--transition);
        }

        .score-label {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .score-feedback {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* Liste des Nudges */
        .nudges-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .nudge-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }

        .nudge-item:hover {
            background-color: var(--surface);
            border-color: var(--text-muted);
        }

        .nudge-item.active {
            background-color: var(--accent-light);
            border-color: var(--accent);
        }

        /* Custom Checkbox */
        .checkbox-container {
            display: flex;
            align-items: center;
            height: 1.25rem;
        }

        .nudge-item input[type="checkbox"] {
            width: 1.25rem;
            height: 1.25rem;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .nudge-details {
            flex: 1;
        }

        .nudge-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }

        .nudge-effect {
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .nudge-item.active .nudge-effect {
            color: var(--accent);
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Indicateur d'Incitations Environnementales</h1>
            <p class="subtitle">Évaluez si votre espace de travail est configuré pour votre performance</p>
        </header>

        <!-- Zone de Score Dynamique -->
        <div class="score-card" id="scoreCard">
            <div class="score-value" id="scoreDisplay">0 / 0</div>
            <div class="score-label" id="scoreLabel">Environnement Neutre</div>
            <div class="score-feedback" id="scoreFeedback">Sélectionnez les incitations présentes autour de vous pour
                évaluer votre espace.</div>
        </div>

        <!-- Liste des Nudges -->
        <div class="nudges-list" id="nudgesList">
            <!-- Les éléments seront générés par le JavaScript -->
        </div>
    </div>

    <script>
        // Liste enrichie de nudges environnementaux (sans poids numériques)
        const nudgesData = [
            { id: 1, title: "Bouteille d'eau visible sur le bureau", effect: "Optimise l'hydratation automatique et l'énergie cognitive." },
            { id: 2, title: "Smartphone hors de vue ou dans une autre pièce", effect: "Libère la capacité d'attention résiduelle et évite l'interruption passive." },
            { id: 3, title: "Casque anti-bruit ou audio à portée de main", effect: "Déclenche l'ancrage vers un mode de travail ultra-concentré (Deep Work)." },
            { id: 4, title: "Bureau épuré (uniquement l'onglet ou l'outil du moment)", effect: "Diminue la charge mentale visuelle et la tentation du multitâche." },
            { id: 5, title: "Lumière naturelle directe ou régulée", effect: "Réduit la fatigue oculaire et synchronise le rythme circadien pour un meilleur éveil." },
            { id: 6, title: "Plante verte ou élément naturel dans le champ de vision", effect: "Favorise la restauration de l'attention et abaisse le niveau de stress." },
            { id: 7, title: "Carnet de notes physique ouvert à côté du clavier", effect: "Permet de décharger rapidement les pensées parasites sans ouvrir un écran." },
            { id: 8, title: "Rappel visuel des 3 objectifs de la journée (Post-it, tableau)", effect: "Maintient le cap sur les priorités face aux urgences de dernière minute." },
            { id: 9, title: "Chaise ou station debout préréglée à la bonne posture", effect: "Réduit l'inconfort physique qui distrait inconsciemment le cerveau." },
            { id: 10, title: "Espace dégagé derrière la chaise pour se lever facilement", effect: "Incite au mouvement et aux micro-pauses actives toutes les heures." }
        ];

        const nudgesListContainer = document.getElementById('nudgesList');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const scoreLabel = document.getElementById('scoreLabel');
        const scoreFeedback = document.getElementById('scoreFeedback');

        // Génération de l'interface
        function initNudges() {
            nudgesListContainer.innerHTML = '';
            nudgesData.forEach(nudge => {
                const item = document.createElement('div');
                item.classList.add('nudge-item');
                item.setAttribute('data-id', nudge.id);

                item.innerHTML = `
                <div class="checkbox-container">
                    <input type="checkbox" id="nudge-${nudge.id}">
                </div>
                <div class="nudge-details">
                    <div class="nudge-title">${nudge.title}</div>
                    <div class="nudge-effect">${nudge.effect}</div>
                </div>
            `;

                // Clic sur l'ensemble de la carte
                item.addEventListener('click', (e) => {
                    const checkbox = item.querySelector('input[type="checkbox"]');
                    if (e.target !== checkbox) {
                        checkbox.checked = !checkbox.checked;
                    }
                    toggleNudgeActive(item, checkbox.checked);
                    calculateScore();
                });

                nudgesListContainer.appendChild(item);
            });

            calculateScore(); // Initialisation de l'affichage du score
        }

        function toggleNudgeActive(element, isActive) {
            if (isActive) {
                element.classList.add('active');
            } else {
                element.classList.remove('active');
            }
        }

        // Calcul du score basé sur le nombre absolu de nudges cochés
        function calculateScore() {
            const totalNudges = nudgesData.length;
            let activeCount = 0;

            nudgesData.forEach(nudge => {
                const checkbox = document.getElementById(`nudge-${nudge.id}`);
                if (checkbox && checkbox.checked) {
                    activeCount++;
                }
            });

            // Mise à jour du texte principal (X / Y)
            scoreDisplay.textContent = `${activeCount} / ${totalNudges}`;

            // Calcul du ratio pour adapter les messages
            const ratio = activeCount / totalNudges;

            if (activeCount === 0) {
                scoreLabel.textContent = "Environnement Neutre";
                scoreFeedback.textContent = "Votre espace de travail ne vous incite pas encore à la performance. Cochez vos premiers aménagements !";
                scoreDisplay.style.color = "var(--text-muted)";
            } else if (ratio <= 0.3) {
                scoreLabel.textContent = "Amorçage Faible";
                scoreFeedback.textContent = "Quelques nudges sont en place, mais l'environnement global tolère encore trop de distractions.";
                scoreDisplay.style.color = "var(--warning)";
            } else if (ratio <= 0.7) {
                scoreLabel.textContent = "Environnement Propice";
                scoreFeedback.textContent = "Bonne configuration. Votre espace commence à travailler activement pour votre concentration.";
                scoreDisplay.style.color = "var(--accent)";
            } else {
                scoreLabel.textContent = "Espace Haute Performance";
                scoreFeedback.textContent = "Excellent ! Votre environnement est optimisé pour réduire la friction et maximiser votre focus.";
                scoreDisplay.style.color = "var(--success)";
            }
        }

        // Lancement
        initNudges();
    </script>

</body>

</html>
