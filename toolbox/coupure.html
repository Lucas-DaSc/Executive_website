<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur de Coupure</title>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f8fafc;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            padding: 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        input[type="time"] {
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            width: 150px;
            cursor: pointer;
        }

        /* --- Cadran de l'Horloge --- */
        .clock-container {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .clock {
            width: 120px;
            height: 120px;
            border: 4px solid var(--text);
            border-radius: 50%;
            position: relative;
            background: var(--bg);
        }

        /* Repères cardinaux (12h, 3h, 6h, 9h) */
        .clock::before {
            content: '';
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 50%;
            width: 2px;
            background: repeating-linear-gradient(to bottom, var(--text-muted) 0, var(--text-muted) 6px, transparent 6px, transparent calc(100% - 6px), var(--text-muted) calc(100% - 6px));
            transform: translateX(-50%);
        }

        /* Centre de l'horloge */
        .clock-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
        }

        /* Aiguille des heures (Coucher) */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            width: 4px;
            height: 40px;
            background: var(--accent);
            border-radius: 4px;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(0deg);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
        }

        /* --- Liste des horaires --- */
        .schedule {
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .item {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .item span:first-child {
            font-weight: 600;
            color: var(--text);
        }

        /* Heures mises à droite sous forme de badges */
        .time-tag {
            background-color: var(--accent-light);
            color: var(--accent);
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Simulateur de Coupure</h1>

        <div class="input-group">
            <label for="bedtime">Heure de coucher idéale : </label>
            <input type="time" id="bedtime" value="22:00" onchange="calculateRoutine()">
        </div>

        <div class="clock-container">
            <div class="clock">
                <div class="clock-center"></div>
                <div id="clock-hand" class="hand"></div>
            </div>
        </div>

        <div id="results" class="schedule"></div>
    </div>

    <script>
        function calculateRoutine() {
            const timeInput = document.getElementById('bedtime').value;
            if (!timeInput) return;

            const [hours, minutes] = timeInput.split(':').map(Number);

            // --- Mise à jour de l'aiguille du cadran ---
            // Calcul de l'angle : 1 heure = 30 degrés (360/12), 1 minute = 0.5 degré
            const degrees = ((hours % 12) * 30) + (minutes * 0.5);
            document.getElementById('clock-hand').style.transform = `translateX(-50%) rotate(${degrees}deg)`;

            const bedDate = new Date();
            bedDate.setHours(hours, minutes, 0);

            const rules = [
                { label: "Sans caféine", offset: -7 },
                { label: "Sans alcool", offset: -6 },
                { label: "Sans nicotine", offset: -5 },
                { label: "Sans repas lourd", offset: -4 },
                { label: "Sans travail", offset: -3 },
                { label: "Brain Dump", offset: -2.5 },
                { label: "Sans écrans", offset: -1.5 },
                { label: "Modification lumière", offset: -1 },
                { label: "Température et Respiration", offset: -0.5 },
                { label: "Sommeil", offset: 0 }
            ];

            const container = document.getElementById('results');
            container.innerHTML = '';

            rules.forEach(rule => {
                const time = new Date(bedDate.getTime() + (rule.offset * 60 * 60 * 1000));
                const timeString = time.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<span>${rule.label}</span> <span class="time-tag">${timeString}</span>`;
                container.appendChild(div);
            });
        }

        // Initial load
        calculateRoutine();
    </script>
</body>

</html>
